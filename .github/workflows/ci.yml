name: CI – Lint, Test & Validate Bicep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff lint
        run: ruff check src/ --output-format github

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true

  validate-bicep:
    name: Validate Bicep IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/

      - name: Build (compile) all Bicep files
        run: |
          for f in infra/main.bicep infra/modules/*.bicep; do
            echo "::group::Compiling $f"
            bicep build "$f" --stdout > /dev/null
            echo "::endgroup::"
          done

      - name: Validate ARM output (what-if dry-run placeholder)
        run: echo "ARM template validated successfully via bicep build"
